<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses — Mani Industries</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.courses-page{padding:100px 2rem 80px;max-width:1280px;margin:0 auto}
.courses-header{margin-bottom:2.5rem}
.courses-header h1{font-family:'Orbitron',monospace;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;margin-bottom:.4rem}
.courses-toolbar{display:flex;flex-wrap:wrap;gap:1rem;align-items:center;margin-bottom:2rem}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4}
.s-input{width:100%;padding:11px 18px 11px 42px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:border .3s}
.s-input:focus{border-color:var(--accent)}
.filter-pills{display:flex;flex-wrap:wrap;gap:8px}
.fp{padding:7px 16px;background:transparent;border:1px solid var(--border);border-radius:50px;color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:.85rem;cursor:pointer;transition:all .25s;white-space:nowrap}
.fp:hover,.fp.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:600}
.stats-bar{display:flex;gap:2rem;margin-bottom:2rem;flex-wrap:wrap}
.sbi .sbn{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;color:var(--accent)}
.sbi .sbl{font-size:.73rem;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.8rem}
.cc{background:var(--bg3);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:transform .3s,box-shadow .3s,border-color .3s;display:flex;flex-direction:column;position:relative}
.cc:hover{transform:translateY(-6px);border-color:var(--accent);box-shadow:0 20px 50px var(--glow)}
.cc-banner{height:140px;display:flex;align-items:center;justify-content:space-between;padding:1.5rem;position:relative;overflow:hidden}
.cc-banner::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,.1),rgba(0,0,0,.3))}
.cc-icon{font-size:3rem;z-index:1;line-height:1}
.cc-price-wrap{text-align:right;z-index:1}
.cc-price{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.cc-price-sub{font-size:.62rem;color:rgba(255,255,255,.7);letter-spacing:1px;margin-top:2px}
.live-badge{position:absolute;top:12px;left:12px;z-index:2;background:rgba(255,50,50,.9);color:#fff;font-family:'Orbitron',monospace;font-size:.52rem;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:50px;display:flex;align-items:center;gap:4px}
.live-dot{width:6px;height:6px;background:#fff;border-radius:50%;animation:lp 1.2s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.owned-badge{position:absolute;top:12px;right:12px;z-index:2;background:rgba(0,255,136,.9);color:#040d1a;font-family:'Orbitron',monospace;font-size:.52rem;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:50px}
.cc-body{padding:1.4rem;flex:1;display:flex;flex-direction:column;gap:.75rem}
.cc-level{font-family:'Orbitron',monospace;font-size:.56rem;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
.cc-title{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;line-height:1.3}
.cc-desc{color:var(--text-dim);font-size:.86rem;line-height:1.65;flex:1}
.cc-tags{display:flex;flex-wrap:wrap;gap:5px}
.cc-tag{font-size:.68rem;padding:3px 10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:50px;color:var(--text-dim)}
.cc-feats{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.cc-feat{font-size:.76rem;color:var(--text-dim);display:flex;align-items:center;gap:5px}
.cc-feat::before{content:'✓';color:var(--accent);font-weight:700;flex-shrink:0}
.cc-live{background:rgba(255,50,50,.06);border:1px solid rgba(255,50,50,.2);border-radius:10px;padding:.65rem 1rem;display:flex;align-items:center;gap:.6rem}
.cc-live svg{flex-shrink:0;opacity:.7;color:#ff3232}
.cc-live-text{font-size:.76rem;color:var(--text-dim);line-height:1.4}
.cc-live-text strong{color:var(--text)}
.cc-footer{padding:1rem 1.4rem 1.4rem;border-top:1px solid var(--border)}
.buy-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);font-family:'Orbitron',monospace;font-size:.73rem;font-weight:700;letter-spacing:1px;border-radius:10px;border:none;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.buy-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px var(--glow)}
.buy-btn.owned{background:linear-gradient(135deg,#00ff88,#00c8a0)}
.view-btn{background:none;border:none;color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:.8rem;cursor:pointer;text-decoration:underline;text-underline-offset:3px;display:block;width:100%;text-align:center;margin-top:.65rem;padding:.3rem;transition:color .2s}
.view-btn:hover{color:var(--accent)}
.no-results{text-align:center;padding:5rem 2rem;color:var(--text-dim)}
.nr-icon{font-size:3rem;margin-bottom:1rem;opacity:.5}
.nr-text{font-family:'Orbitron',monospace;font-size:.82rem;letter-spacing:1px}

/* DETAIL PANEL */
.dp-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:8999;pointer-events:none;transition:background .35s}
.dp-backdrop.open{background:rgba(0,0,0,.55);pointer-events:all}
.dp{position:fixed;right:0;top:0;bottom:0;width:min(480px,100vw);background:var(--bg2);border-left:1px solid var(--border);z-index:9000;overflow-y:auto;padding:2rem;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.dp.open{transform:translateX(0)}
.dp-close{position:absolute;top:1.2rem;right:1.2rem;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;color:var(--text-dim);transition:all .2s}
.dp-close:hover{color:var(--accent);border-color:var(--accent)}
@media(max-width:600px){.courses-grid{grid-template-columns:1fr}.cc-feats{grid-template-columns:1fr}}
</style>
</head>
<body data-theme="blue">
<nav id="navbar">
  <div class="nav-logo" onclick="window.location.href='index.html'" style="cursor:pointer">
    <img src="logo.png" alt="M" onerror="this.style.display='none'">
  </div>
  <ul class="nav-links">
    <li><a href="index.html"     class="nav-link">Home</a></li>
    <li><a href="courses.html"   class="nav-link active">Courses</a></li>
    <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
    <li><a href="community.html" class="nav-link">Community</a></li>
  </ul>
  <div class="nav-right">
    <div class="theme-switcher">
      <button class="theme-btn" id="themeBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg></button>
      <div class="theme-dropdown" id="themeDropdown"><div class="theme-title">Theme</div><div class="theme-grid"><button class="theme-option active" data-theme="blue" style="background:#00c8ff"></button><button class="theme-option" data-theme="red" style="background:#ff3366"></button><button class="theme-option" data-theme="orange" style="background:#ff6b35"></button><button class="theme-option" data-theme="yellow" style="background:#ffd700"></button><button class="theme-option" data-theme="green" style="background:#00ff88"></button><button class="theme-option" data-theme="purple" style="background:#8b5cf6"></button><button class="theme-option" data-theme="pink" style="background:#ec4899"></button><button class="theme-option" data-theme="brown" style="background:#c2855a"></button><button class="theme-option" data-theme="dark" style="background:#888"></button></div></div>
    </div>
    <div id="profileNavWrap" style="position:relative">
      <button class="icon-btn" id="profileBtn" onclick="window.location.href='index.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
      <div class="user-nav-chip" id="userNavChip" style="display:none" onclick="window.location.href='dashboard.html'"><div class="user-nav-avatar" id="userNavAvatar">U</div><span class="user-nav-name" id="userNavName">User</span></div>
    </div>
  </div>
</nav>

<main class="courses-page">
  <div class="courses-header">
    <div class="section-tag">Library</div>
    <h1>All <span class="accent">Courses</span></h1>
    <p id="courseCountText" style="color:var(--text-dim);font-size:.92rem">Purchase individually — 1-year access · 2 live classes/week</p>
  </div>
  <div class="stats-bar">
    <div class="sbi"><div class="sbn">7</div><div class="sbl">Courses</div></div>
    <div class="sbi"><div class="sbn">2×</div><div class="sbl">Live/Week</div></div>
    <div class="sbi"><div class="sbn">1yr</div><div class="sbl">Access</div></div>
    <div class="sbi"><div class="sbn">∞</div><div class="sbl">Rewatches</div></div>
  </div>
  <div class="courses-toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" class="s-input" placeholder="Search — Python, robotics, ML..." oninput="render()">
    </div>
    <div class="filter-pills">
      <button class="fp active" onclick="setFilter('all',this)">All</button>
      <button class="fp" onclick="setFilter('web',this)">Web Dev</button>
      <button class="fp" onclick="setFilter('language',this)">Programming</button>
      <button class="fp" onclick="setFilter('data',this)">Data & AI</button>
      <button class="fp" onclick="setFilter('hardware',this)">Hardware</button>
    </div>
  </div>
  <div class="courses-grid" id="grid"></div>
  <div class="no-results" id="noResults" style="display:none"><div class="nr-icon">🔍</div><div class="nr-text">No courses found</div></div>
</main>

<!-- Detail panel -->
<div class="dp-backdrop" id="dpBg" onclick="closePanel()"></div>
<div class="dp" id="detailPanel"><button class="dp-close" onclick="closePanel()">×</button><div id="dpContent"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script src="payments.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
let CU=null, owned=new Set(), cat='all';

auth.onAuthStateChanged(async user => {
  CU = user;
  if (user) {
    owned = await getUserCourses(user.uid);
    const name = user.displayName||user.email.split('@')[0];
    document.getElementById('userNavAvatar').innerHTML = user.photoURL?`<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`  :name[0].toUpperCase();
    document.getElementById('userNavName').textContent = name;
    document.getElementById('userNavChip').style.display='flex';
    document.getElementById('profileBtn').style.display='none';
  }
  render();
});

function setFilter(c,btn) {
  cat=c;
  document.querySelectorAll('.fp').forEach(b=>b.classList.remove('active'));
  btn?.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = Object.values(COURSES);
  if (cat!=='all') list = list.filter(c=>c.cat.includes(cat));
  if (q) list = list.filter(c=>c.title.toLowerCase().includes(q)||c.tags.some(t=>t.toLowerCase().includes(q))||c.desc.toLowerCase().includes(q));
  document.getElementById('courseCountText').textContent = `${list.length} course${list.length!==1?'s':''} — purchase individually, valid for 1 full year`;
  const grid=document.getElementById('grid'), none=document.getElementById('noResults');
  if (!list.length){grid.innerHTML='';none.style.display='block';return;}
  none.style.display='none';
  grid.innerHTML = list.map(c=>{
    const isOwned = owned.has(c.id);
    return `<div class="cc">
      <div class="cc-banner" style="background:linear-gradient(135deg,${c.color}22,${c.color}55)">
        <div class="live-badge"><div class="live-dot"></div>LIVE</div>
        ${isOwned?`<div class="owned-badge">✓ Owned</div>`:''}
        <div class="cc-icon">${c.icon}</div>
        <div class="cc-price-wrap"><div class="cc-price">${formatPrice(c.price)}</div><div class="cc-price-sub">one-time · 1 year</div></div>
      </div>
      <div class="cc-body">
        <div class="cc-level">${c.level}</div>
        <h3 class="cc-title">${c.title}</h3>
        <p class="cc-desc">${c.desc}</p>
        <div class="cc-tags">${c.tags.slice(0,4).map(t=>`<span class="cc-tag">${t}</span>`).join('')}</div>
        <div class="cc-feats">${c.features.slice(0,4).map(f=>`<div class="cc-feat">${f}</div>`).join('')}</div>
        <div class="cc-live"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><div class="cc-live-text"><strong>2 live sessions/week</strong> · Recorded for replay</div></div>
      </div>
      <div class="cc-footer">
        ${isOwned
          ?`<button class="buy-btn owned" onclick="window.location.href='course-page.html?id=${c.id}'">▶ Continue Learning</button>`
          :`<button class="buy-btn" onclick="${CU?`buyCourseDirect('${c.id}')`:`"window.location.href='index.html'")`}">Buy Now — ${formatPrice(c.price)}</button>`
        }
        <button class="view-btn" onclick="openPanel('${c.id}')">View full curriculum →</button>
      </div>
    </div>`;
  }).join('');
}

function openPanel(id) {
  const c=COURSES[id]; if(!c) return;
  const isOwned=owned.has(id);
  const total=c.modules.reduce((a,m)=>a+m.lessons.length,0);
  document.getElementById('dpContent').innerHTML = `
    <div style="margin-bottom:2rem">
      <div style="font-size:3rem;margin-bottom:.6rem">${c.icon}</div>
      <div style="font-family:'Orbitron',monospace;font-size:.58rem;letter-spacing:2px;color:var(--accent);margin-bottom:.3rem">${c.level}</div>
      <h2 style="font-family:'Orbitron',monospace;font-size:1.15rem;font-weight:700;margin-bottom:.6rem">${c.title}</h2>
      <p style="color:var(--text-dim);font-size:.88rem;line-height:1.7;margin-bottom:1.2rem">${c.desc}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:1.2rem">
        ${[['Price',formatPrice(c.price)],['Duration',c.weeks+' weeks'],['Lessons',total]].map(([l,v])=>`
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.65rem;text-align:center">
          <div style="font-family:'Orbitron',monospace;font-size:.55rem;color:var(--accent);margin-bottom:.2rem">${l}</div>
          <div style="font-family:'Orbitron',monospace;font-size:1rem;font-weight:700">${v}</div>
        </div>`).join('')}
      </div>
    </div>
    <div style="margin-bottom:1.5rem">
      <div style="font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:.8rem">WHAT YOU GET</div>
      ${c.features.map(f=>`<div style="display:flex;align-items:center;gap:.6rem;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.86rem"><span style="color:var(--accent);font-weight:700">✓</span>${f}</div>`).join('')}
    </div>
    <div style="margin-bottom:1.5rem">
      <div style="font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:.8rem">CURRICULUM (${c.modules.length} modules)</div>
      ${c.modules.map((m,i)=>`
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-bottom:.5rem;overflow:hidden">
          <div style="padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
            <div style="font-weight:700;font-size:.88rem">${i+1}. ${m.title}</div>
            <div style="font-size:.75rem;color:var(--text-dim)">${m.lessons.length} lessons</div>
          </div>
          <div style="display:none;border-top:1px solid var(--border)">
            ${m.lessons.map(l=>`<div style="display:flex;align-items:center;gap:.6rem;padding:.6rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem;color:var(--text-dim)"><span>${l.type==='video'?'▶':'💻'}</span><span style="flex:1">${l.name}</span><span>${l.dur}</span></div>`).join('')}
          </div>
        </div>`).join('')}
    </div>
    ${isOwned
      ?`<button class="buy-btn owned" style="padding:13px" onclick="window.location.href='course-page.html?id=${c.id}';closePanel()">▶ Continue Learning</button>`
      :`<button class="buy-btn" style="padding:13px" onclick="closePanel();${CU?`buyCourseDirect('${c.id}')`:`window.location.href='index.html'`}">Buy Now — ${formatPrice(c.price)}</button>`
    }`;
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('dpBg').classList.add('open');
}
function closePanel(){document.getElementById('detailPanel').classList.remove('open');document.getElementById('dpBg').classList.remove('open')}

render();
</script>
</body>
</html>
