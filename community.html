<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community — Mani Industries</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050d1a;--bg2:#070f20;--bg3:#0a1628;--accent:#00c8ff;--accent2:#0088cc;--glow:rgba(0,200,255,0.2);--text:#e8f4ff;--text-dim:#7a9bb5;--border:rgba(0,200,255,0.15);--nav-bg:rgba(5,13,26,0.95)}
[data-theme="red"]{--accent:#ff3366;--accent2:#cc1144;--glow:rgba(255,51,102,0.2);--border:rgba(255,51,102,0.15)}
[data-theme="orange"]{--accent:#ff6b35;--accent2:#e05020;--glow:rgba(255,107,53,0.2);--border:rgba(255,107,53,0.15)}
[data-theme="yellow"]{--accent:#ffd700;--accent2:#ccaa00;--glow:rgba(255,215,0,0.2);--border:rgba(255,215,0,0.15)}
[data-theme="green"]{--accent:#00ff88;--accent2:#00cc66;--glow:rgba(0,255,136,0.2);--border:rgba(0,255,136,0.15)}
[data-theme="purple"]{--accent:#8b5cf6;--accent2:#6d35e0;--glow:rgba(139,92,246,0.2);--border:rgba(139,92,246,0.15)}
[data-theme="pink"]{--accent:#ec4899;--accent2:#c0347a;--glow:rgba(236,72,153,0.2);--border:rgba(236,72,153,0.15)}
[data-theme="brown"]{--accent:#c2855a;--accent2:#a06840;--glow:rgba(194,133,90,0.2);--border:rgba(194,133,90,0.15)}
[data-theme="dark"]{--accent:#aaa;--accent2:#888;--glow:rgba(150,150,150,0.15);--border:rgba(150,150,150,0.1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* LAYOUT */
.com-wrap{display:grid;grid-template-columns:240px 220px 1fr;height:100vh;padding-top:0}
/* NAVBAR */
#navbar{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:1000}
.nav-logo{display:flex;align-items:center;gap:.6rem;cursor:pointer;text-decoration:none;color:inherit}
.nav-logo img{width:32px;height:32px;object-fit:contain;filter:drop-shadow(0 0 6px var(--accent))}
.nav-logo-text{font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700}
.nav-right{display:flex;align-items:center;gap:.75rem}
.user-chip{display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:50px;padding:5px 12px 5px 5px;cursor:pointer}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;color:var(--bg);overflow:hidden;flex-shrink:0}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-name{font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700}
/* SERVERS SIDEBAR */
.servers{padding-top:56px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;gap:.25rem;padding-left:.75rem;padding-right:.75rem}
.server-header{font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;padding:.9rem .25rem .4rem}
.server-btn{display:flex;align-items:center;gap:.75rem;padding:9px 10px;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--text-dim);font-size:.88rem;border:1px solid transparent;width:100%;text-align:left}
.server-btn:hover{background:rgba(255,255,255,.04);color:var(--text);border-color:var(--border)}
.server-btn.active{background:rgba(0,200,255,.1);color:var(--accent);border-color:var(--border)}
.server-icon{width:34px;height:34px;border-radius:10px;background:rgba(0,200,255,.1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.server-info{flex:1;min-width:0}
.server-name{font-weight:700;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.server-online{font-size:.7rem;color:var(--text-dim)}
.online-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#00ff88;margin-right:4px}
/* CHANNELS */
.channels{padding-top:56px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto}
.ch-server-name{padding:1rem 1rem .5rem;font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;border-bottom:1px solid var(--border);color:var(--accent)}
.ch-section{padding:.6rem 1rem .3rem;font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
.ch-btn{display:flex;align-items:center;gap:.6rem;padding:7px 1rem;cursor:pointer;transition:all .2s;color:var(--text-dim);font-size:.87rem;width:100%;text-align:left;border-radius:0}
.ch-btn:hover{background:rgba(255,255,255,.04);color:var(--text)}
.ch-btn.active{background:rgba(0,200,255,.1);color:var(--accent)}
.ch-icon{font-size:.85rem;opacity:.7}
/* CHAT AREA */
.chat-area{padding-top:56px;display:flex;flex-direction:column;height:100vh}
.chat-header{padding:.9rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem;background:var(--bg);flex-shrink:0}
.chat-header-title{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700}
.chat-header-desc{font-size:.8rem;color:var(--text-dim)}
.online-count{margin-left:auto;font-size:.78rem;color:var(--text-dim);display:flex;align-items:center;gap:.4rem}
.messages{flex:1;overflow-y:auto;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:.25rem}
.msg{display:flex;gap:.9rem;padding:.4rem 0;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:.82rem;font-weight:700;color:var(--bg);flex-shrink:0;overflow:hidden;margin-top:2px}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg-content{flex:1}
.msg-header{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.2rem}
.msg-name{font-weight:700;font-size:.9rem;color:var(--accent)}
.msg-name.own{color:#00ff88}
.msg-time{font-size:.72rem;color:var(--text-dim)}
.msg-text{font-size:.9rem;line-height:1.55;color:var(--text);word-break:break-word}
.msg-group{padding:.15rem 0}
.msg-group .msg{padding:.1rem 0}
.system-msg{text-align:center;font-size:.75rem;color:var(--text-dim);padding:.5rem;margin:.25rem 0}
/* INPUT */
.chat-input-wrap{padding:1rem 1.5rem;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.chat-input-inner{display:flex;align-items:flex-end;gap:.75rem;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;transition:border .25s}
.chat-input-inner:focus-within{border-color:var(--accent)}
textarea.chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.95rem;resize:none;max-height:120px;line-height:1.5;padding:0}
textarea.chat-input::placeholder{color:var(--text-dim)}
.send-btn{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
.send-btn:hover{transform:scale(1.08);box-shadow:0 4px 15px var(--glow)}
/* LOCK OVERLAY */
.lock-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1rem;color:var(--text-dim);text-align:center;padding:2rem}
.lock-icon{font-size:3rem;opacity:.5}
.lock-title{font-family:'Orbitron',monospace;font-size:.85rem}
.upgrade-btn{padding:10px 24px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700;border-radius:8px;border:none;cursor:pointer;transition:all .3s;margin-top:.5rem}
.upgrade-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--glow)}
/* AUTH GUARD */
#authGuard{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1rem}
.guard-logo{font-family:'Orbitron',monospace;font-size:3rem;color:var(--accent);animation:gp 1.5s ease-in-out infinite}
@keyframes gp{0%,100%{text-shadow:0 0 20px var(--accent)}50%{text-shadow:0 0 60px var(--accent)}}
@media(max-width:900px){.com-wrap{grid-template-columns:0 1fr};.servers{display:none}}
@media(max-width:600px){.com-wrap{grid-template-columns:1fr 1fr};.channels{font-size:.8rem}}
</style>
</head>
<body data-theme="blue">

<div id="authGuard"><img src="logo.png" alt="Mani Industries" style="width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 0 20px var(--accent));animation:gp 1.5s ease-in-out infinite"><div style="font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:4px;color:var(--text-dim)">Loading community...</div></div>

<nav id="navbar">
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="M" onerror="this.style.display='none'">
    <span class="nav-logo-text">MANI INDUSTRIES</span>
  </a>
  <div class="nav-right">
    <a href="dashboard.html" style="font-family:'Orbitron',monospace;font-size:.65rem;color:var(--text-dim);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:8px;transition:all .2s">Dashboard</a>
    <div class="user-chip">
      <div class="user-avatar" id="navAvatar">U</div>
      <span class="user-name" id="navName">User</span>
    </div>
  </div>
</nav>

<div class="com-wrap">
  <!-- SERVERS (course channels) -->
  <div class="servers" id="serversList">
    <div class="server-header">Channels</div>
  </div>
  <!-- CHANNEL LIST -->
  <div class="channels" id="channelsList">
    <div class="ch-server-name" id="chServerName">Select a channel</div>
  </div>
  <!-- CHAT -->
  <div class="chat-area">
    <div class="chat-header">
      <div>
        <div class="chat-header-title" id="chatTitle"># general</div>
        <div class="chat-header-desc" id="chatDesc">Select a channel to start chatting</div>
      </div>
      <div class="online-count"><span class="online-dot"></span><span id="onlineCount">0</span> online</div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input-wrap" id="chatInputWrap">
      <div class="chat-input-inner">
        <textarea class="chat-input" id="chatInput" placeholder="Message #general..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
let CU=null, userPlan='free', activeChan=null, msgListener=null;

const CHANNELS = {
  general:[
    {id:'general',name:'general',icon:'💬',desc:'General discussion — say hello!'},
    {id:'announcements',name:'announcements',icon:'📢',desc:'Platform announcements'},
    {id:'introductions',name:'introductions',icon:'👋',desc:'Introduce yourself'},
  ],
  webdev:[
    {id:'webdev-help',name:'webdev-help',icon:'🌐',desc:'HTML, CSS, JS questions'},
    {id:'webdev-showcase',name:'webdev-showcase',icon:'🎨',desc:'Share your web projects'},
  ],
  python:[
    {id:'python-help',name:'python-help',icon:'🐍',desc:'Python & automation questions'},
    {id:'python-projects',name:'python-projects',icon:'⚙️',desc:'Share your Python projects'},
  ],
  cpp:[{id:'cpp-help',name:'cpp-help',icon:'⚙️',desc:'C++ & systems programming'}],
  java:[{id:'java-help',name:'java-help',icon:'☕',desc:'Java & enterprise patterns'}],
  datascience:[{id:'ds-help',name:'ds-help',icon:'🧠',desc:'Data science & ML questions'}],
  ml:[{id:'ml-help',name:'ml-help',icon:'🤖',desc:'Machine learning & AI'}],
  robotics:[{id:'robotics-help',name:'robotics-help',icon:'🦾',desc:'Robotics & Arduino'}],
  groups:[
    {id:'group-finder',name:'group-finder',icon:'🔍',desc:'Find teammates for group projects'},
    {id:'project-showcase',name:'project-showcase',icon:'🏆',desc:'Share your group projects'},
  ]
};

const SERVER_META = {
  general:   {name:'General',    icon:'💬', desc:'Open to all'},
  webdev:    {name:'Web Dev',    icon:'🌐', desc:'Course channel'},
  python:    {name:'Python',     icon:'🐍', desc:'Course channel'},
  cpp:       {name:'C++',        icon:'⚙️', desc:'Course channel'},
  java:      {name:'Java',       icon:'☕', desc:'Course channel'},
  datascience:{name:'Data Sci',  icon:'🧠', desc:'Course channel'},
  ml:        {name:'ML & AI',    icon:'🤖', desc:'Course channel'},
  robotics:  {name:'Robotics',   icon:'🦾', desc:'Course channel'},
  groups:    {name:'Groups',     icon:'👥', desc:'Pro+ feature'},
};

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href='index.html'; return; }
  CU = user;
  document.getElementById('authGuard').style.display='none';
  const name = user.displayName||user.email.split('@')[0];
  document.getElementById('navName').textContent = name;
  document.getElementById('navAvatar').innerHTML = user.photoURL?`<img src="${user.photoURL}" alt="">`  :name[0].toUpperCase();

  userPlan = await getUserPlan(user.uid);
  const owned = await getUserCourses(user.uid);
  updatePresence(user.uid);

  // Build server list
  const sl = document.getElementById('serversList');
  const generalMeta = SERVER_META.general;
  sl.innerHTML += buildServerBtn('general', generalMeta, true);
  if (hasPlanFeature(userPlan,'community')) {
    sl.innerHTML += `<div class="server-header">Course Channels</div>`;
    for (const [key,meta] of Object.entries(SERVER_META)) {
      if (key==='general'||key==='groups') continue;
      const hasCourse = owned.has(key);
      sl.innerHTML += buildServerBtn(key, meta, hasCourse);
    }
    sl.innerHTML += `<div class="server-header">Community</div>`;
    sl.innerHTML += buildServerBtn('groups', SERVER_META.groups, hasPlanFeature(userPlan,'groupProject'));
  } else {
    sl.innerHTML += `<div style="padding:.75rem;font-size:.78rem;color:var(--text-dim);background:rgba(0,200,255,.04);border:1px solid var(--border);border-radius:10px;margin:.5rem 0">
      <div style="font-family:'Orbitron',monospace;font-size:.6rem;color:var(--accent);margin-bottom:.3rem">UPGRADE</div>
      Get Basic+ to unlock all community channels
      <button class="upgrade-btn" style="margin-top:.6rem;padding:7px 14px;font-size:.6rem" onclick="window.location.href='index.html#pricing'">Upgrade →</button>
    </div>`;
  }

  // Auto-open general
  selectServer('general');
});

function buildServerBtn(key, meta, accessible) {
  return `<button class="server-btn" id="srv-${key}" onclick="selectServer('${key}')">
    <div class="server-icon" style="opacity:${accessible?.8:.4}">${meta.icon}</div>
    <div class="server-info">
      <div class="server-name">${meta.name}${!accessible?' 🔒':''}</div>
      <div class="server-online">${meta.desc}</div>
    </div>
  </button>`;
}

let activeServer = null;
function selectServer(key) {
  activeServer = key;
  document.querySelectorAll('.server-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('srv-'+key)?.classList.add('active');
  const meta = SERVER_META[key];
  document.getElementById('chServerName').textContent = `${meta.icon} ${meta.name}`;

  const chans = CHANNELS[key]||[];
  const cl = document.getElementById('channelsList');
  cl.innerHTML = `<div class="ch-server-name">${meta.icon} ${meta.name}</div>`;
  if (chans.length) {
    cl.innerHTML += `<div class="ch-section">Channels</div>`;
    chans.forEach(c => {
      cl.innerHTML += `<button class="ch-btn" id="ch-${c.id}" onclick="selectChannel('${c.id}','${c.name}','${c.desc}')">${c.icon} #${c.name}</button>`;
    });
  }
  if (chans.length) selectChannel(chans[0].id, chans[0].name, chans[0].desc);
}

function selectChannel(chanId, name, desc) {
  activeChan = chanId;
  document.querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ch-'+chanId)?.classList.add('active');
  document.getElementById('chatTitle').textContent = '#'+name;
  document.getElementById('chatDesc').textContent = desc;
  document.getElementById('chatInput').placeholder = `Message #${name}...`;

  // Check access
  const canChat = hasPlanFeature(userPlan,'community') || chanId==='general' || chanId==='announcements';
  const inputWrap = document.getElementById('chatInputWrap');
  if (!canChat) {
    inputWrap.innerHTML = `<div class="lock-overlay"><div class="lock-icon">🔒</div><div class="lock-title">Basic Plan Required</div><p style="font-size:.82rem">Upgrade to access all community channels and chat with other learners.</p><button class="upgrade-btn" onclick="window.location.href='index.html#pricing'">Upgrade Now →</button></div>`;
    document.getElementById('messages').innerHTML = `<div class="lock-overlay"><div class="lock-icon">💬</div><div class="lock-title" style="font-size:.82rem">Join the conversation</div></div>`;
    return;
  }

  // Re-render input if needed
  if (!document.getElementById('chatInput')) {
    inputWrap.innerHTML = `<div class="chat-input-inner"><textarea class="chat-input" id="chatInput" rows="1" onkeydown="handleKey(event)"></textarea><button class="send-btn" onclick="sendMessage()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>`;
    document.getElementById('chatInput').placeholder = `Message #${name}...`;
  }

  loadMessages(chanId);
}

function loadMessages(chanId) {
  if (msgListener) msgListener(); // detach old
  const el = document.getElementById('messages');
  el.innerHTML = '';

  if (!rtdb) { el.innerHTML = `<div class="system-msg">Realtime Database not configured yet.</div>`; return; }

  msgListener = rtdb.ref(`community/${chanId}/messages`).limitToLast(60).on('value', snap => {
    el.innerHTML = '';
    let prevUid = null;
    snap.forEach(child => {
      const m = child.val();
      const isOwn = m.uid === CU?.uid;
      const isGroup = m.uid === prevUid;
      prevUid = m.uid;
      const time = m.ts ? new Date(m.ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
      el.innerHTML += `<div class="msg ${isGroup?'msg-group':''}">
        <div class="msg-avatar">${isGroup?'':m.photoURL?`<img src="${m.photoURL}" alt="">`:m.name?.[0]?.toUpperCase()||'?'}</div>
        <div class="msg-content">
          ${isGroup?'':`<div class="msg-header"><span class="msg-name ${isOwn?'own':''}">${m.name||'Anonymous'}</span><span class="msg-time">${time}</span></div>`}
          <div class="msg-text">${escapeHtml(m.text)}</div>
        </div>
      </div>`;
    });
    el.scrollTop = el.scrollHeight;
    updateOnline();
  });
}

function updateOnline() {
  if (!rtdb) return;
  rtdb.ref('presence').on('value', snap => {
    let count = 0;
    snap.forEach(child => { if (child.val()?.online) count++; });
    document.getElementById('onlineCount').textContent = count;
  });
}

function sendMessage() {
  if (!CU||!activeChan||!rtdb) return;
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text) return;
  const name = CU.displayName||CU.email.split('@')[0];
  rtdb.ref(`community/${activeChan}/messages`).push({
    uid:CU.uid, name, photoURL:CU.photoURL||'', text,
    ts: firebase.database.ServerValue.TIMESTAMP,
  });
  input.value = '';
  input.style.height = 'auto';
  awardPoints(CU.uid, name, 2, 'chat');
}

function handleKey(e) {
  if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
  const ta=document.getElementById('chatInput');
  if(ta){ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,120)+'px';}
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

(function(){const s=localStorage.getItem('mi_theme')||'blue';document.body.dataset.theme=s;})();
</script>
</body>
</html>
